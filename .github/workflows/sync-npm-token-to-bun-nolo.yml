name: Sync NPM token to bun-nolo

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Copy NPM_TOKEN to bun-nolo
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          if [[ -z "${NPM_TOKEN}" ]]; then
            echo "NPM_TOKEN is missing in nolo-cli secrets." >&2
            exit 1
          fi
          printf '%s' "$NPM_TOKEN" | gh secret set NPM_TOKEN -R nolotus/bun-nolo
          echo "Synced NPM_TOKEN to nolotus/bun-nolo"